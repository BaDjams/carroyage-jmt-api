<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>carroyage-jmt-api — Test</title>
    <style>
      :root {
        --bg: #0f172a;
        --panel: #1e293b;
        --panel-2: #334155;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #38bdf8;
        --accent2: #a78bfa;
        --ok: #4ade80;
        --err: #f87171;
        --warn: #facc15;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.4;
      }
      header {
        padding: 14px 24px;
        background: var(--panel);
        border-bottom: 1px solid var(--panel-2);
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      header h1 { font-size: 15px; margin: 0; font-weight: 600; }
      .pill {
        font-size: 11px;
        padding: 3px 8px;
        border-radius: 999px;
        background: var(--panel-2);
        color: var(--muted);
      }
      .pill.ok  { background: rgba(74,222,128,.15); color: var(--ok); }
      .pill.err { background: rgba(248,113,113,.15); color: var(--err); }
      button.link-btn {
        padding: 4px 10px;
        background: transparent;
        border: 1px solid var(--panel-2);
        border-radius: 6px;
        color: var(--muted);
        cursor: pointer;
        font-size: 12px;
      }
      button.link-btn:hover { border-color: var(--accent); color: var(--accent); }

      main {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px 24px;
        display: grid;
        grid-template-columns: 420px 1fr;
        gap: 20px;
      }
      @media (max-width: 900px) { main { grid-template-columns: 1fr; } }

      section {
        background: var(--panel);
        border: 1px solid var(--panel-2);
        border-radius: 8px;
        padding: 16px;
      }
      section h2 {
        margin: 0 0 14px;
        font-size: 13px;
        font-weight: 600;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: .05em;
      }
      label {
        display: block;
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 3px;
        font-weight: 500;
      }
      input[type="text"],
      input[type="number"],
      input[type="color"],
      select {
        width: 100%;
        padding: 7px 9px;
        background: var(--bg);
        border: 1px solid var(--panel-2);
        border-radius: 6px;
        color: var(--text);
        font-size: 12px;
      }
      input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; }
      input[type="checkbox"] { width: auto; accent-color: var(--accent); }
      .check { display: flex; align-items: center; gap: 8px; font-size: 12px; }
      .check label { margin: 0; color: var(--text); }

      .row   { display: grid; grid-template-columns: 1fr 1fr;     gap: 10px; margin-bottom: 10px; }
      .row3  { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
      .row1  { display: grid; grid-template-columns: 1fr;         gap: 10px; margin-bottom: 10px; }

      /* Mode toggle */
      .mode-tabs { display: flex; gap: 0; margin-bottom: 14px; border-radius: 6px; overflow: hidden; border: 1px solid var(--panel-2); }
      .mode-tab {
        flex: 1;
        padding: 7px 10px;
        background: var(--bg);
        border: none;
        color: var(--muted);
        cursor: pointer;
        font-size: 12px;
        font-weight: 500;
        transition: background .15s;
      }
      .mode-tab.active { background: var(--accent); color: #0c1322; }

      /* Zone box */
      .zone-box {
        border: 1px solid var(--panel-2);
        border-radius: 6px;
        padding: 10px;
        margin-bottom: 10px;
      }
      .zone-box-title { font-size: 11px; color: var(--accent2); font-weight: 600; margin-bottom: 8px; }

      /* Separator */
      .sep { height: 1px; background: var(--panel-2); margin: 14px 0; }

      /* Action buttons */
      .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
      button.btn {
        padding: 8px 14px;
        border: none;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        font-size: 12px;
      }
      button.btn-primary  { background: var(--accent);  color: #0c1322; }
      button.btn-purple   { background: var(--accent2); color: #0c1322; }
      button.btn-ghost    { background: var(--panel-2); color: var(--text); }
      button.btn:disabled { opacity: .4; cursor: not-allowed; }

      .note { font-size: 11px; color: var(--muted); margin-top: 8px; }

      /* Right panel */
      .right-col { display: flex; flex-direction: column; gap: 20px; }

      /* Log */
      .log { font-family: ui-monospace, "Cascadia Code", Consolas, monospace; font-size: 11px; max-height: 140px; overflow-y: auto; }
      .log .line { padding: 1px 0; }
      .log .ok   { color: var(--ok); }
      .log .err  { color: var(--err); }
      .log .info { color: var(--muted); }

      pre {
        background: var(--bg);
        border: 1px solid var(--panel-2);
        border-radius: 6px;
        padding: 10px;
        font-size: 11px;
        font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
        overflow: auto;
        max-height: 260px;
        margin: 0;
        white-space: pre-wrap;
        word-break: break-all;
      }

      /* Image preview */
      #img-preview-wrap {
        display: none;
        border: 1px solid var(--panel-2);
        border-radius: 6px;
        overflow: hidden;
        background: #000;
        text-align: center;
      }
      #img-preview { max-width: 100%; display: block; margin: 0 auto; }
    </style>
  </head>
  <body>
    <header>
      <h1>carroyage-jmt-api</h1>
      <span id="health-pill" class="pill">/health: ?</span>
      <span id="root-pill"   class="pill">/api: ?</span>
      <span style="flex:1"></span>
      <button class="link-btn" id="btn-ping">Ping</button>
    </header>

    <main>
      <!-- LEFT: form -->
      <div>
        <section>
          <h2>Paramètres CADO</h2>

          <!-- Mode -->
          <div class="mode-tabs">
            <button class="mode-tab active" data-mode="single">Coordonnée unique</button>
            <button class="mode-tab"        data-mode="zone">Zone (2 points)</button>
          </div>

          <form id="form">

            <!-- Single coord -->
            <div id="single-fields">
              <div class="row">
                <div>
                  <label>latitude</label>
                  <input name="latitude" type="number" step="any" value="45.7997" />
                </div>
                <div>
                  <label>longitude</label>
                  <input name="longitude" type="number" step="any" value="6.8534" />
                </div>
              </div>
            </div>

            <!-- Zone fields -->
            <div id="zone-fields" style="display:none">
              <div class="zone-box">
                <div class="zone-box-title">Point 1 (NW)</div>
                <div class="row">
                  <div>
                    <label>latitude</label>
                    <input name="z1lat" type="number" step="any" value="45.82" />
                  </div>
                  <div>
                    <label>longitude</label>
                    <input name="z1lon" type="number" step="any" value="6.82" />
                  </div>
                </div>
              </div>
              <div class="zone-box">
                <div class="zone-box-title">Point 2 (SE)</div>
                <div class="row">
                  <div>
                    <label>latitude</label>
                    <input name="z2lat" type="number" step="any" value="45.77" />
                  </div>
                  <div>
                    <label>longitude</label>
                    <input name="z2lon" type="number" step="any" value="6.90" />
                  </div>
                </div>
              </div>
            </div>

            <!-- Common grid params -->
            <div class="row">
              <div>
                <label>scale (m)</label>
                <input name="scale" type="number" step="any" value="1000" />
              </div>
              <div>
                <label>gridType</label>
                <select name="gridType">
                  <option>Q12</option>
                  <option>Z18</option>
                  <option>Z14</option>
                  <option>Q9</option>
                  <option>Z26</option>
                  <option>custom</option>
                </select>
              </div>
            </div>

            <div class="row1">
              <div>
                <label>gridName</label>
                <input name="gridName" type="text" value="Test Zone" />
              </div>
            </div>

            <!-- referencePointChoice hidden in zone mode -->
            <div class="row3" id="single-extra">
              <div>
                <label>contentType</label>
                <select name="contentType">
                  <option value="grid-points" selected>grid-points</option>
                  <option value="grid-only">grid-only</option>
                  <option value="points-only">points-only</option>
                </select>
              </div>
              <div>
                <label>referencePointChoice</label>
                <select name="referencePointChoice">
                  <option value="center" selected>center</option>
                  <option value="origin">origin</option>
                </select>
              </div>
              <div>
                <label>letteringDirection</label>
                <select name="letteringDirection">
                  <option value="ascending" selected>ascending</option>
                  <option value="descending">descending</option>
                </select>
              </div>
            </div>

            <div class="row3">
              <div>
                <label>gridColor</label>
                <input name="gridColor" type="color" value="#FF0000" />
              </div>
              <div>
                <label>colorName</label>
                <input name="colorName" type="text" value="red" />
              </div>
              <div>
                <label>colorOpacity</label>
                <input name="colorOpacity" type="number" step="0.05" min="0" max="1" value="0.5" />
              </div>
            </div>

            <div class="row3">
              <div>
                <label>deviation (°)</label>
                <input name="deviation" type="number" step="any" value="0" />
              </div>
              <div>
                <label>labelSize</label>
                <input name="labelSize" type="number" step="0.1" min="0" max="10" value="1" />
              </div>
              <div>
                <label>iconSize</label>
                <input name="iconSize" type="number" step="0.1" min="0" max="10" value="2" />
              </div>
            </div>

            <div class="row">
              <div class="check">
                <input type="checkbox" id="swapAxes" name="swapAxes" />
                <label for="swapAxes">swapAxes</label>
              </div>
              <div class="check">
                <input type="checkbox" id="doubleEntry" name="doubleEntry" />
                <label for="doubleEntry">doubleEntry</label>
              </div>
            </div>

            <div class="sep"></div>
            <h2 style="font-size:13px;font-weight:600;color:var(--accent2);text-transform:uppercase;letter-spacing:.05em;margin:0 0 12px">Image</h2>

            <div class="row">
              <div>
                <label>tileProvider</label>
                <select name="tileProvider">
                  <option value="ign_ortho" selected>IGN orthophoto</option>
                  <option value="ign_plan">IGN plan</option>
                  <option value="osm">OpenStreetMap</option>
                  <option value="none">Aucun (blanc)</option>
                </select>
              </div>
              <div>
                <label>imageFormat</label>
                <select name="imageFormat">
                  <option value="png" selected>PNG</option>
                  <option value="jpeg">JPEG</option>
                </select>
              </div>
            </div>

            <div class="row">
              <div>
                <label>lineWidth <span id="lw-val">1</span></label>
                <input name="lineWidth" type="range" min="0.5" max="10" step="0.5" value="1"
                       oninput="document.getElementById('lw-val').textContent=this.value" />
              </div>
              <div>
                <label>jpegQuality <span id="jq-val">0.9</span></label>
                <input name="jpegQuality" type="range" min="0" max="1" step="0.05" value="0.9"
                       oninput="document.getElementById('jq-val').textContent=this.value" />
              </div>
            </div>

            <div class="row">
              <div class="check" style="padding-top:16px">
                <input type="checkbox" id="upscale" name="upscale" checked />
                <label for="upscale">upscale (→ 2160px)</label>
              </div>
              <div>
                <label>fileName (optionnel)</label>
                <input name="fileName" type="text" placeholder="auto" />
              </div>
            </div>

            <div class="actions">
              <button type="button" class="btn btn-ghost"    id="btn-preview">Aperçu JSON</button>
              <button type="button" class="btn btn-primary"  id="btn-kmz">Télécharger KMZ</button>
              <button type="button" class="btn btn-purple"   id="btn-image">Générer Image</button>
            </div>
            <div class="note">Le KMZ et l'image sont retournés directement par l'API et proposés au téléchargement / affichés ici.</div>
          </form>
        </section>
      </div>

      <!-- RIGHT -->
      <div class="right-col">
        <section>
          <h2>Log</h2>
          <div class="log" id="log"></div>
        </section>

        <section>
          <h2>Réponse JSON</h2>
          <pre id="output">—</pre>
        </section>

        <section id="img-section" style="display:none">
          <h2>Aperçu image</h2>
          <div id="img-preview-wrap">
            <img id="img-preview" src="" alt="aperçu" />
          </div>
          <div class="note" id="img-meta" style="margin-top:8px"></div>
        </section>
      </div>
    </main>

    <script>
      /* ---- helpers ---- */
      const $ = sel => document.querySelector(sel);
      let mode = 'single';

      function log(msg, cls = 'info') {
        const el = document.createElement('div');
        el.className = 'line ' + cls;
        el.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        $('#log').prepend(el);
      }

      /* ---- mode tabs ---- */
      document.querySelectorAll('.mode-tab').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.mode-tab').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          mode = btn.dataset.mode;
          $('#single-fields').style.display = mode === 'single' ? '' : 'none';
          $('#zone-fields').style.display   = mode === 'zone'   ? '' : 'none';
          $('#single-extra').style.display  = mode === 'single' ? '' : 'none';
        });
      });

      /* ---- build body ---- */
      function readForm() {
        const f = $('#form');
        const obj = {};

        if (mode === 'single') {
          obj.latitude  = Number(f.latitude.value);
          obj.longitude = Number(f.longitude.value);
          obj.referencePointChoice = f.referencePointChoice.value;
          obj.letteringDirection   = f.letteringDirection.value;
          obj.contentType          = f.contentType.value;
        } else {
          obj.zonePoint1 = { latitude: Number(f.z1lat.value), longitude: Number(f.z1lon.value) };
          obj.zonePoint2 = { latitude: Number(f.z2lat.value), longitude: Number(f.z2lon.value) };
          obj.letteringDirection = 'ascending';
          obj.contentType        = 'grid-points';
        }

        obj.scale     = Number(f.scale.value);
        obj.gridType  = f.gridType.value;
        obj.gridName  = f.gridName.value || undefined;
        obj.gridColor = f.gridColor.value;
        obj.colorName = f.colorName.value || undefined;
        obj.colorOpacity = Number(f.colorOpacity.value);
        obj.deviation  = Number(f.deviation.value);
        obj.labelSize  = Number(f.labelSize.value);
        obj.iconSize   = Number(f.iconSize.value);
        obj.swapAxes   = f.swapAxes.checked;
        obj.doubleEntry = f.doubleEntry.checked;

        return obj;
      }

      function readImageParams() {
        const f = $('#form');
        return {
          tileProvider: f.tileProvider.value,
          imageFormat:  f.imageFormat.value,
          jpegQuality:  Number(f.jpegQuality.value),
          lineWidth:    Number(f.lineWidth.value),
          upscale:      f.upscale.checked,
          fileName:     f.fileName.value || undefined,
        };
      }

      /* ---- ping ---- */
      async function ping() {
        const setPill = (id, ok, txt) => {
          const el = document.getElementById(id);
          el.className = 'pill ' + (ok ? 'ok' : 'err');
          el.textContent = txt;
        };
        try {
          const r = await fetch('/health');
          const j = await r.json();
          setPill('health-pill', r.ok && j.status === 'ok', `/health: ${r.status}`);
        } catch { setPill('health-pill', false, '/health: KO'); }
        try {
          const r = await fetch('/api');
          const j = await r.json();
          setPill('root-pill', r.ok, `/api: ${r.status} ${j.name || ''}`);
          $('#output').textContent = JSON.stringify(j, null, 2);
        } catch { setPill('root-pill', false, '/api: KO'); }
      }

      /* ---- preview ---- */
      async function preview() {
        const body = readForm();
        log('POST /api/kmz/cado/preview');
        try {
          const r = await fetch('/api/kmz/cado/preview', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          const j = await r.json();
          $('#output').textContent = JSON.stringify(j, null, 2);
          log(`preview → ${r.status}`, r.ok ? 'ok' : 'err');
        } catch (e) { log('preview error: ' + e.message, 'err'); }
      }

      /* ---- kmz ---- */
      async function generateKmz() {
        const body = readForm();
        log('POST /api/kmz/cado');
        try {
          const r = await fetch('/api/kmz/cado', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          if (!r.ok) {
            const j = await r.json().catch(() => ({}));
            $('#output').textContent = JSON.stringify(j, null, 2);
            log(`kmz → ${r.status}`, 'err');
            return;
          }
          const cells = r.headers.get('X-Grid-Cells');
          const cd    = r.headers.get('Content-Disposition') || '';
          const m     = cd.match(/filename="([^"]+)"/);
          const fname = m ? m[1] : (body.gridName || 'cado') + '.kmz';
          const blob  = await r.blob();
          triggerDownload(blob, fname);
          $('#output').textContent = JSON.stringify({ ok: true, filename: fname, bytes: blob.size, cells }, null, 2);
          log(`KMZ ↓ ${fname} (${blob.size} oct, ${cells} cellules)`, 'ok');
        } catch (e) { log('kmz error: ' + e.message, 'err'); }
      }

      /* ---- image ---- */
      async function generateImage() {
        const body = { ...readForm(), ...readImageParams() };
        log('POST /api/image/cado');
        $('#btn-image').disabled = true;
        try {
          const r = await fetch('/api/image/cado', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          if (!r.ok) {
            const j = await r.json().catch(() => ({}));
            $('#output').textContent = JSON.stringify(j, null, 2);
            log(`image → ${r.status}`, 'err');
            return;
          }
          const cd    = r.headers.get('Content-Disposition') || '';
          const m     = cd.match(/filename="([^"]+)"/);
          const fmt   = body.imageFormat;
          const fname = m ? m[1] : (body.gridName || 'cado') + '.' + (fmt === 'jpeg' ? 'jpg' : 'png');
          const blob  = await r.blob();

          // preview
          const url = URL.createObjectURL(blob);
          $('#img-preview').src = url;
          $('#img-preview-wrap').style.display = '';
          $('#img-section').style.display = '';
          $('#img-meta').textContent = `${fname} — ${(blob.size / 1024).toFixed(0)} Ko`;

          // download
          triggerDownload(blob, fname);
          log(`Image ↓ ${fname} (${(blob.size/1024).toFixed(0)} Ko)`, 'ok');
          $('#output').textContent = JSON.stringify({ ok: true, filename: fname, bytes: blob.size }, null, 2);
        } catch (e) { log('image error: ' + e.message, 'err'); }
        finally { $('#btn-image').disabled = false; }
      }

      function triggerDownload(blob, filename) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = filename;
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 5000);
      }

      /* ---- events ---- */
      $('#btn-ping').addEventListener('click', ping);
      $('#btn-preview').addEventListener('click', preview);
      $('#btn-kmz').addEventListener('click', generateKmz);
      $('#btn-image').addEventListener('click', generateImage);

      ping();
    </script>
  </body>
</html>
